palette = "catppuccin_macchiato"

format = """
[](surface0)\
$directory\
[](fg:surface0 bg:surface1)\
$git_branch\
$git_status\
[](fg:surface1 bg:surface2)\
$nodejs\
$python\
$rust\
$golang\
[](surface2)\
$character"""

[directory]
style = "fg:text bg:surface0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = ".../"

[git_branch]
symbol = " "
style = "fg:text bg:surface1"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "fg:text bg:surface1"
format = "[$all_status$ahead_behind ]($style)"

[nodejs]
symbol = " "
style = "fg:text bg:surface2"
format = "[ $symbol$version ]($style)"

[python]
symbol = " "
style = "fg:text bg:surface2"
format = "[ $symbol$version ]($style)"

[rust]
symbol = " "
style = "fg:text bg:surface2"
format = "[ $symbol$version ]($style)"

[golang]
symbol = " "
style = "fg:text bg:surface2"
format = "[ $symbol$version ]($style)"

[character]
success_symbol = " [](green)"
error_symbol = " [](red)"

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
mantle = "#1e2030"
crust = "#181926"
